<header class="hero">
  <div class="hero-art-card"><img src="kid-road-trip-map.png" alt="Road trip map from Las Vegas to Zion showing Maddox and Lincoln as two boys"></div>
  <div class="hero-copy">
    <p class="kicker">The Big Adventure</p>
    <h1>Zion Field Guide</h1>
    <p class="lead">Hoover Dam, Hurricane condo, Zion picnic, and one big canyon day.</p>
  </div>
</header>

<main>
  <section class="section">
    <div class="grid-2">
      <button class="image-button" data-modal="desert-spotter.png"><img src="desert-spotter.png" alt="Desert road trip spotter checklist"><span>Open desert spotter</span></button>
      <button class="image-button" data-modal="zion-explorer.png"><img src="zion-explorer.png" alt="Zion explorer activity guide"><span>Open Zion explorer</span></button>
    </div>
  </section>
  <section class="section">
    <div class="mission-grid">
      <label><input type="checkbox" data-key="zion-shoes"> Narrows shoes ready</label>
      <label><input type="checkbox" data-key="zion-poles"> Walking sticks or poles ready</label>
      <label><input type="checkbox" data-key="zion-water"> Water bottles filled</label>
      <label><input type="checkbox" data-key="zion-dry"> Dry clothes packed</label>
      <label><input type="checkbox" data-key="zion-snacks"> Snacks packed</label>
      <label><input type="checkbox" data-key="zion-picnic"> Picnic plan picked</label>
    </div>
  </section>
</main>

<div class="modal" id="imageModal" aria-hidden="true" role="dialog" aria-label="Expanded image">
  <button class="modal-close" type="button" aria-label="Close image">×</button>
  <img alt="Expanded trip guide image">
</div>

<a class="lost-button" href="contacts.html" aria-label="Open family contact information">If Lost</a>
